<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240" role="img" aria-label="LangGraph stateful graph diagram: START flows to retrieve, then grade. The grade node conditionally loops back to retrieve when more information is needed, or proceeds to generate and END. A shared state flows through every node.">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b93a7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="820" height="240" rx="12" fill="#050b13"/>

  <!-- straight edges -->
  <line x1="74" y1="150" x2="120" y2="150" stroke="#8b93a7" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="250" y1="150" x2="300" y2="150" stroke="#8b93a7" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="430" y1="150" x2="540" y2="150" stroke="#8b93a7" stroke-width="2" marker-end="url(#ah)"/>
  <text x="485" y="142" fill="#22c55e" font-family="monospace" font-size="12" text-anchor="middle">relevant</text>
  <line x1="680" y1="150" x2="726" y2="150" stroke="#8b93a7" stroke-width="2" marker-end="url(#ah)"/>

  <!-- conditional loop edge -->
  <path d="M365 124 C 365 60, 185 60, 185 124" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="275" y="50" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="middle">needs more info</text>

  <!-- START -->
  <circle cx="52" cy="150" r="22" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <text x="52" y="154" fill="#e5e7eb" font-family="monospace" font-size="11" text-anchor="middle">START</text>

  <!-- retrieve -->
  <rect x="120" y="124" width="130" height="52" rx="10" fill="#0a1322" stroke="url(#bg)" stroke-width="2"/>
  <text x="185" y="155" fill="#e5e7eb" font-family="monospace" font-size="13" text-anchor="middle">retrieve</text>

  <!-- grade -->
  <rect x="300" y="124" width="130" height="52" rx="10" fill="#0a1322" stroke="url(#bg)" stroke-width="2"/>
  <text x="365" y="155" fill="#e5e7eb" font-family="monospace" font-size="13" text-anchor="middle">grade</text>

  <!-- generate -->
  <rect x="540" y="124" width="140" height="52" rx="10" fill="#0a1322" stroke="url(#bg)" stroke-width="2"/>
  <text x="610" y="155" fill="#e5e7eb" font-family="monospace" font-size="13" text-anchor="middle">generate</text>

  <!-- END -->
  <circle cx="748" cy="150" r="22" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <text x="748" y="154" fill="#e5e7eb" font-family="monospace" font-size="12" text-anchor="middle">END</text>

  <text x="410" y="212" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">a shared state flows through every node</text>
</svg>
